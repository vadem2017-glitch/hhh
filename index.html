<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <title>Telegram Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --card-w: min(92vw, 420px);
      --rocket-size: clamp(150px, 36vw, 215px);
      --text-main: rgba(255,255,255,0.96);
      --text-soft: rgba(255,255,255,0.72);
      --text-dim: rgba(255,255,255,0.48);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      overflow: hidden;
      touch-action: manipulation;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #fff;
      background:
        radial-gradient(circle at top, rgba(0,255,170,0.10), transparent 30%),
        radial-gradient(circle at bottom, rgba(255,70,70,0.10), transparent 36%),
        linear-gradient(160deg, #081018 0%, #111827 45%, #05070b 100%);
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      padding:
        calc(12px + var(--safe-top))
        12px
        calc(12px + var(--safe-bottom))
        12px;
    }

    .bg-stars,
    .bg-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .bg-glow::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 52%;
      width: 420px;
      height: 420px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(82,180,255,0.18), transparent 65%);
      filter: blur(34px);
      animation: floatGlow 4s ease-in-out infinite;
    }

    @keyframes floatGlow {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, calc(-50% - 10px)) scale(1.05); }
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: rgba(255,255,255,0.8);
      box-shadow: 0 0 10px rgba(255,255,255,0.4);
      animation: twinkle var(--dur) ease-in-out infinite;
      opacity: var(--op);
    }

    @keyframes twinkle {
      0%, 100% { opacity: var(--op); transform: scale(1); }
      50% { opacity: 1; transform: scale(1.8); }
    }

    .app {
      position: relative;
      z-index: 2;
      width: var(--card-w);
      max-height: calc(100vh - var(--safe-top) - var(--safe-bottom) - 24px);
      overflow: hidden;
      border-radius: 28px;
      padding: 18px 16px 18px;
      text-align: center;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(16px);
      box-shadow:
        0 20px 60px rgba(0,0,0,0.45),
        inset 0 1px 0 rgba(255,255,255,0.05);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .badge {
      align-self: center;
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 13px;
      color: rgba(255,255,255,0.82);
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.07);
    }

    h1 {
      margin: 2px 0 0;
      font-size: clamp(28px, 6vw, 42px);
      line-height: 1.05;
      letter-spacing: -0.04em;
      color: var(--text-main);
    }

    .sub {
      margin: 0 auto;
      max-width: 330px;
      font-size: clamp(14px, 3.6vw, 16px);
      line-height: 1.42;
      color: var(--text-soft);
    }

    .arena {
      position: relative;
      flex: 1 1 auto;
      min-height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 6px 0;
    }

    .tap-zone {
      position: relative;
      width: min(80vw, 290px);
      height: min(84vw, 320px);
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
    }

    .rocket-btn {
      position: absolute;
      width: var(--rocket-size);
      height: calc(var(--rocket-size) * 1.34);
      border: none;
      background: transparent;
      outline: none;
      cursor: pointer;
      transform: translateY(0) scale(1);
      transition:
        transform 0.14s ease,
        opacity 0.25s ease,
        filter 0.25s ease;
      touch-action: manipulation;
      z-index: 4;
      padding: 0;
      will-change: transform;
    }

    .rocket-btn.pulse .rocket-body {
      animation: rocketPulse 2s infinite;
    }

    @keyframes rocketPulse {
      0% {
        filter: drop-shadow(0 0 0 rgba(95,190,255,0.00));
      }
      50% {
        filter: drop-shadow(0 0 18px rgba(95,190,255,0.18));
      }
      100% {
        filter: drop-shadow(0 0 0 rgba(95,190,255,0.00));
      }
    }

    .rocket-btn.shake {
      animation: rocketShake 0.18s linear infinite;
    }

    @keyframes rocketShake {
      0% { transform: translate(0, 0) scale(var(--scale, 1)); }
      20% { transform: translate(-2px, 1px) scale(var(--scale, 1)); }
      40% { transform: translate(2px, -1px) scale(var(--scale, 1)); }
      60% { transform: translate(-2px, -1px) scale(var(--scale, 1)); }
      80% { transform: translate(2px, 1px) scale(var(--scale, 1)); }
      100% { transform: translate(0, 0) scale(var(--scale, 1)); }
    }

    .rocket-btn.launching {
      animation: launchRocket 1.3s cubic-bezier(.18,.72,.24,1) forwards;
      pointer-events: none;
    }

    @keyframes launchRocket {
      0% {
        transform: translateY(0) scale(var(--scale, 1));
        opacity: 1;
      }
      10% {
        transform: translateY(-8px) scale(calc(var(--scale, 1) * 1.02));
      }
      100% {
        transform: translateY(-165vh) scale(calc(var(--scale, 1) * 0.88));
        opacity: 0;
      }
    }

    .rocket-svg {
      width: 100%;
      height: 100%;
      overflow: visible;
      filter: drop-shadow(0 22px 28px rgba(0,0,0,0.32));
    }

    .rocket-body {
      transition: transform 0.2s ease, filter 0.2s ease;
    }

    .hull-main {
      transition: fill 0.25s ease;
    }

    .hull-shadow,
    .window-glow,
    .flame-core,
    .flame-outer,
    .booster-light,
    .smoke {
      transition: all 0.25s ease;
    }

    .rocket-btn.stage-1 .hull-main { fill: #e7eefc; }
    .rocket-btn.stage-2 .hull-main { fill: #dde8ff; }
    .rocket-btn.stage-3 .hull-main { fill: #d5e3ff; }
    .rocket-btn.stage-4 .hull-main { fill: #cfe0ff; }
    .rocket-btn.stage-5 .hull-main { fill: #c8dbff; }

    .rocket-btn .window-glow {
      opacity: 0.25;
      fill: #7fe1ff;
    }

    .rocket-btn.stage-2 .window-glow { opacity: 0.42; }
    .rocket-btn.stage-3 .window-glow { opacity: 0.60; }
    .rocket-btn.stage-4 .window-glow { opacity: 0.78; }
    .rocket-btn.stage-5 .window-glow { opacity: 0.96; }

    .rocket-btn .booster-light {
      opacity: 0.15;
    }

    .rocket-btn.stage-2 .booster-light { opacity: 0.38; }
    .rocket-btn.stage-3 .booster-light { opacity: 0.55; }
    .rocket-btn.stage-4 .booster-light { opacity: 0.80; }
    .rocket-btn.stage-5 .booster-light { opacity: 1; }

    .rocket-btn .flame-outer,
    .rocket-btn .flame-core,
    .rocket-btn .smoke {
      opacity: 0;
      transform-origin: 50% 0%;
    }

    .rocket-btn.stage-2 .flame-outer { opacity: 0.35; }
    .rocket-btn.stage-2 .flame-core { opacity: 0.22; }

    .rocket-btn.stage-3 .flame-outer { opacity: 0.55; }
    .rocket-btn.stage-3 .flame-core { opacity: 0.42; }

    .rocket-btn.stage-4 .flame-outer,
    .rocket-btn.stage-4 .flame-core,
    .rocket-btn.stage-4 .smoke {
      opacity: 0.78;
    }

    .rocket-btn.stage-5 .flame-outer,
    .rocket-btn.stage-5 .flame-core,
    .rocket-btn.stage-5 .smoke {
      opacity: 1;
    }

    .rocket-btn.stage-4 .flame-outer,
    .rocket-btn.stage-4 .flame-core,
    .rocket-btn.stage-5 .flame-outer,
    .rocket-btn.stage-5 .flame-core {
      animation: flameFlicker 0.12s ease-in-out infinite alternate;
    }

    .rocket-btn.stage-4 .smoke,
    .rocket-btn.stage-5 .smoke {
      animation: smokePulse 0.35s ease-in-out infinite alternate;
    }

    @keyframes flameFlicker {
      0% { transform: scaleY(0.92) translateY(0); }
      100% { transform: scaleY(1.12) translateY(3px); }
    }

    @keyframes smokePulse {
      0% { transform: translateY(0) scale(0.96); opacity: 0.72; }
      100% { transform: translateY(6px) scale(1.06); opacity: 1; }
    }

    .launch-trail {
      position: absolute;
      left: 50%;
      bottom: 16%;
      width: 54px;
      height: 180px;
      transform: translateX(-50%);
      opacity: 0;
      pointer-events: none;
      z-index: 2;
    }

    .launch-trail.show {
      opacity: 1;
      animation: trailGrow 1.15s ease-out forwards;
    }

    @keyframes trailGrow {
      0% {
        opacity: 0.1;
        transform: translateX(-50%) scaleY(0.2);
      }
      18% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translateX(-50%) translateY(48px) scaleY(1.35);
      }
    }

    .trail-flame {
      position: absolute;
      left: 50%;
      top: 0;
      width: 32px;
      height: 80px;
      transform: translateX(-50%);
      background: radial-gradient(circle at 50% 0%, #fff4b3 0%, #ffb300 46%, #ff5a00 75%, transparent 100%);
      filter: blur(3px);
      border-radius: 50% 50% 55% 55%;
    }

    .trail-smoke {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 54px;
      height: 120px;
      transform: translateX(-50%);
      background: radial-gradient(circle at 50% 20%, rgba(255,255,255,0.55) 0%, rgba(225,235,255,0.18) 45%, transparent 70%);
      filter: blur(10px);
      border-radius: 50%;
    }

    .counter {
      min-height: 20px;
      margin-top: -2px;
      font-size: 14px;
      color: rgba(255,255,255,0.78);
    }

    .hint {
      margin-top: -2px;
      font-size: 13px;
      color: var(--text-dim);
    }

    .center-result {
      position: absolute;
      inset: 50% auto auto 50%;
      transform: translate(-50%, -50%) scale(0.88);
      width: min(74vw, 240px);
      padding: 16px 16px 14px;
      border-radius: 22px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow:
        0 20px 40px rgba(0,0,0,0.30),
        inset 0 1px 0 rgba(255,255,255,0.06);
      backdrop-filter: blur(16px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.28s ease, transform 0.28s ease;
      z-index: 6;
    }

    .center-result.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .center-result-label {
      font-size: 13px;
      color: rgba(255,255,255,0.68);
      margin-bottom: 8px;
    }

    .center-result-number {
      font-size: clamp(42px, 12vw, 58px);
      font-weight: 800;
      letter-spacing: -0.06em;
      line-height: 1;
      color: #fff;
      text-shadow: 0 0 24px rgba(255,255,255,0.18);
    }

    .center-result-sub {
      margin-top: 8px;
      font-size: 12px;
      color: rgba(255,255,255,0.56);
    }

    .again-btn {
      align-self: center;
      border: none;
      border-radius: 16px;
      padding: 14px 18px;
      min-width: 160px;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, #2b80ff, #6d4dff);
      box-shadow: 0 12px 28px rgba(47,108,255,0.32);
      cursor: pointer;
      display: none;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .again-btn.show {
      display: inline-block;
    }

    .again-btn:active {
      transform: translateY(1px) scale(0.98);
    }

    .particle {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 14px;
      height: 14px;
      margin-left: -7px;
      margin-top: -7px;
      pointer-events: none;
      opacity: 1;
      transform: translate(0, 0) scale(1);
      animation: fly 980ms cubic-bezier(.15,.75,.25,1) forwards;
      box-shadow: 0 0 18px currentColor;
      z-index: 7;
    }

    @keyframes fly {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(1) rotate(0deg);
      }
      72% { opacity: 1; }
      100% {
        opacity: 0;
        transform: translate(var(--x), var(--y)) scale(0.18) rotate(360deg);
      }
    }

    .flash {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 40px;
      height: 40px;
      transform: translate(-50%, -50%) scale(0.2);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.95), rgba(120,180,255,0.42), transparent 72%);
      pointer-events: none;
      opacity: 0;
      animation: flash 420ms ease-out forwards;
      z-index: 7;
    }

    @keyframes flash {
      0% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(0.2);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(7);
      }
    }

    @media (max-width: 390px) {
      .app {
        padding: 16px 14px 16px;
        gap: 8px;
      }

      .arena {
        min-height: 236px;
      }

      .badge {
        font-size: 12px;
        padding: 7px 12px;
      }

      .again-btn {
        min-width: 148px;
        padding: 13px 16px;
        font-size: 15px;
      }
    }

    @media (max-height: 760px) {
      .app { gap: 7px; }
      .arena { min-height: 205px; }
      .sub { font-size: 14px; }
    }

    @media (max-height: 680px) {
      :root { --rocket-size: 138px; }

      .arena { min-height: 182px; }

      h1 { font-size: 26px; }

      .sub {
        font-size: 13px;
        line-height: 1.34;
      }

      .counter,
      .hint,
      .center-result-label,
      .center-result-sub {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-stars" id="stars"></div>
  <div class="bg-glow"></div>

  <div class="app">
    <div class="badge">Telegram Mini App Test</div>
    <h1>Ракета</h1>
    <div class="sub">
      Тапай по ракете. Двигатель начнёт запускаться, телефон будет пульсировать, потом ракета взлетит, а на её месте появится случайный результат.
    </div>

    <div class="arena" id="arena">
      <div class="tap-zone">
        <button class="rocket-btn pulse stage-1" id="rocketBtn" aria-label="Ракета">
          <svg class="rocket-svg" viewBox="0 0 220 300" aria-hidden="true">
            <defs>
              <linearGradient id="hullGradient" x1="0" x2="0" y1="0" y2="1">
                <stop offset="0%" stop-color="#f6fbff"/>
                <stop offset="100%" stop-color="#d7e6ff"/>
              </linearGradient>
              <linearGradient id="noseGradient" x1="0" x2="0" y1="0" y2="1">
                <stop offset="0%" stop-color="#ff6a7d"/>
                <stop offset="100%" stop-color="#d9264f"/>
              </linearGradient>
              <linearGradient id="finGradient" x1="0" x2="1" y1="0" y2="1">
                <stop offset="0%" stop-color="#4da2ff"/>
                <stop offset="100%" stop-color="#2457ff"/>
              </linearGradient>
              <linearGradient id="flameGradient" x1="0" x2="0" y1="0" y2="1">
                <stop offset="0%" stop-color="#fff6b1"/>
                <stop offset="45%" stop-color="#ffb300"/>
                <stop offset="100%" stop-color="#ff4f00"/>
              </linearGradient>
              <linearGradient id="flameCoreGradient" x1="0" x2="0" y1="0" y2="1">
                <stop offset="0%" stop-color="#ffffff"/>
                <stop offset="100%" stop-color="#ffd866"/>
              </linearGradient>
            </defs>

            <g class="rocket-body">
              <path class="fin-left" d="M62 170 C34 184, 20 212, 22 244 C45 233, 60 214, 70 188 Z" fill="url(#finGradient)"/>
              <path class="fin-right" d="M158 170 C186 184, 200 212, 198 244 C175 233, 160 214, 150 188 Z" fill="url(#finGradient)"/>
              <rect class="tail-base" x="88" y="198" width="44" height="34" rx="14" fill="#7a8cff"/>

              <path class="hull-main" d="M110 20
                C88 36, 68 74, 64 120
                L64 190
                C64 216, 84 236, 110 236
                C136 236, 156 216, 156 190
                L156 120
                C152 74, 132 36, 110 20 Z" fill="url(#hullGradient)"/>

              <path class="hull-shadow" d="M110 20
                C127 36, 145 74, 149 120
                L149 190
                C149 208, 137 225, 120 232
                C144 230, 156 211, 156 190
                L156 120
                C152 74, 132 36, 110 20 Z" fill="rgba(120,150,255,0.14)"/>

              <path class="nose" d="M110 20 C99 28, 90 42, 84 58 C99 51, 121 51, 136 58 C130 42, 121 28, 110 20 Z" fill="url(#noseGradient)"/>

              <circle cx="110" cy="105" r="26" fill="#1b4d8f"/>
              <circle cx="110" cy="105" r="18" fill="#91ecff"/>
              <circle class="window-glow" cx="110" cy="105" r="18"/>
              <circle cx="103" cy="98" r="5" fill="rgba(255,255,255,0.55)"/>

              <rect x="98" y="148" width="24" height="42" rx="10" fill="#ff5e6f"/>
              <circle class="booster-light" cx="110" cy="171" r="8" fill="#fff3a8"/>
            </g>

            <g class="engine">
              <ellipse class="smoke" cx="110" cy="252" rx="34" ry="18" fill="rgba(220,230,255,0.38)"/>
              <path class="flame-outer" d="M110 228
                C97 244, 88 266, 94 284
                C100 278, 106 270, 110 300
                C114 270, 120 278, 126 284
                C132 266, 123 244, 110 228 Z"
                fill="url(#flameGradient)"/>
              <path class="flame-core" d="M110 236
                C102 248, 100 264, 104 276
                C108 270, 110 264, 110 286
                C110 264, 112 270, 116 276
                C120 264, 118 248, 110 236 Z"
                fill="url(#flameCoreGradient)"/>
            </g>
          </svg>
        </button>

        <div class="launch-trail" id="launchTrail">
          <div class="trail-flame"></div>
          <div class="trail-smoke"></div>
        </div>

        <div class="center-result" id="centerResult">
          <div class="center-result-label">Твой случайный результат</div>
          <div class="center-result-number" id="resultNumber">0</div>
          <div class="center-result-sub">Число выпало после старта</div>
        </div>
      </div>
    </div>

    <div class="counter" id="counter">Тапов: 0</div>
    <div class="hint">На 10-м тапе — запуск ракеты и случайное число.</div>

    <button class="again-btn" id="againBtn">Ещё раз</button>
  </div>

  <script>
    if (window.Telegram && Telegram.WebApp) {
      Telegram.WebApp.ready();
      Telegram.WebApp.expand();
    }

    const stars = document.getElementById("stars");
    const rocketBtn = document.getElementById("rocketBtn");
    const againBtn = document.getElementById("againBtn");
    const counter = document.getElementById("counter");
    const arena = document.getElementById("arena");
    const centerResult = document.getElementById("centerResult");
    const resultNumber = document.getElementById("resultNumber");
    const launchTrail = document.getElementById("launchTrail");

    let clicks = 0;
    let launched = false;
    let rollingTimer = null;
    let preLaunchBuzzTimer = null;

    function createStars() {
      for (let i = 0; i < 22; i++) {
        const s = document.createElement("div");
        s.className = "star";
        s.style.left = Math.random() * 100 + "%";
        s.style.top = Math.random() * 100 + "%";
        s.style.setProperty("--dur", (2 + Math.random() * 3).toFixed(2) + "s");
        s.style.setProperty("--op", (0.25 + Math.random() * 0.6).toFixed(2));
        stars.appendChild(s);
      }
    }

    function vibrate(type) {
      try {
        if (window.Telegram && Telegram.WebApp && Telegram.WebApp.HapticFeedback) {
          if (type === "light") Telegram.WebApp.HapticFeedback.impactOccurred("light");
          if (type === "medium") Telegram.WebApp.HapticFeedback.impactOccurred("medium");
          if (type === "heavy") Telegram.WebApp.HapticFeedback.impactOccurred("heavy");
          if (type === "success") Telegram.WebApp.HapticFeedback.notificationOccurred("success");
          if (type === "warning") Telegram.WebApp.HapticFeedback.notificationOccurred("warning");
        }
      } catch (e) {}
    }

    function startPreLaunchBuzz() {
      stopPreLaunchBuzz();

      let step = 0;
      const pattern = ["light", "light", "medium", "light", "medium", "medium"];

      preLaunchBuzzTimer = setInterval(() => {
        if (launched) return;
        vibrate(pattern[Math.min(step, pattern.length - 1)]);
        step++;
      }, 170);
    }

    function stopPreLaunchBuzz() {
      clearInterval(preLaunchBuzzTimer);
      preLaunchBuzzTimer = null;
    }

    function getStageByClicks(value) {
      if (value <= 2) return 1;
      if (value <= 4) return 2;
      if (value <= 6) return 3;
      if (value <= 8) return 4;
      return 5;
    }

    function setStage(stage) {
      rocketBtn.classList.remove("stage-1", "stage-2", "stage-3", "stage-4", "stage-5");
      rocketBtn.classList.add(`stage-${stage}`);
    }

    function updateVisualState() {
      const scale = 1 + clicks * 0.05;
      rocketBtn.style.setProperty("--scale", scale.toFixed(2));
      rocketBtn.style.transform = `scale(${scale})`;

      rocketBtn.classList.remove("shake");
      setStage(getStageByClicks(clicks));

      if (clicks >= 7) {
        rocketBtn.classList.add("shake");
      }

      if (clicks === 7) {
        startPreLaunchBuzz();
      }

      counter.textContent = `Тапов: ${clicks}`;
    }

    function createFlash() {
      const flash = document.createElement("div");
      flash.className = "flash";
      arena.appendChild(flash);
      setTimeout(() => flash.remove(), 450);
    }

    function createParticles() {
      const colors = [
        "#ffffff", "#ffeaa6", "#ffd24a", "#ffb000",
        "#ff7a00", "#ff6b6b", "#8cd8ff", "#c9f4ff"
      ];

      for (let i = 0; i < 36; i++) {
        const p = document.createElement("div");
        p.className = "particle";

        const angle = (Math.PI * 2 * i) / 36 + (Math.random() * 0.4);
        const distance = 88 + Math.random() * 135;
        const x = Math.cos(angle) * distance;
        const y = Math.sin(angle) * distance;

        const size = 7 + Math.random() * 14;
        const color = colors[Math.floor(Math.random() * colors.length)];

        p.style.setProperty("--x", `${x}px`);
        p.style.setProperty("--y", `${y}px`);
        p.style.width = `${size}px`;
        p.style.height = `${size}px`;
        p.style.marginLeft = `${-size / 2}px`;
        p.style.marginTop = `${-size / 2}px`;
        p.style.background = color;
        p.style.color = color;

        const shape = Math.random();
        if (shape > 0.66) p.style.borderRadius = "3px";
        else if (shape > 0.33) p.style.borderRadius = "50% 20% 50% 20%";
        else p.style.borderRadius = "50%";

        arena.appendChild(p);
        setTimeout(() => p.remove(), 1050);
      }
    }

    function getRandomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function rollResult(finalValue) {
      centerResult.classList.add("show");

      let steps = 16;
      clearInterval(rollingTimer);

      rollingTimer = setInterval(() => {
        resultNumber.textContent = getRandomInt(1, 100);
        steps--;

        if (steps <= 0) {
          clearInterval(rollingTimer);
          resultNumber.textContent = finalValue;
          vibrate("success");
        }
      }, 55);
    }

    function launchRocket() {
      launched = true;
      stopPreLaunchBuzz();

      rocketBtn.classList.remove("pulse", "shake");
      rocketBtn.classList.add("launching");
      launchTrail.classList.add("show");

      createFlash();
      createParticles();
      vibrate("heavy");

      const randomValue = getRandomInt(1, 100);

      setTimeout(() => {
        rollResult(randomValue);
      }, 760);

      counter.textContent = "Пуск. Ракета улетела.";
      againBtn.classList.add("show");

      setTimeout(() => {
        launchTrail.classList.remove("show");
      }, 1200);
    }

    function pressRocket(event) {
      event.preventDefault();
      if (launched) return;

      clicks += 1;
      updateVisualState();

      if (clicks >= 5 && clicks < 7) vibrate("light");
      if (clicks >= 7 && clicks < 9) vibrate("medium");
      if (clicks >= 9) vibrate("warning");

      if (clicks >= 10) {
        launchRocket();
      }
    }

    rocketBtn.addEventListener("pointerdown", pressRocket, { passive: false });
    rocketBtn.addEventListener("click", (event) => {
      event.preventDefault();
    }, { passive: false });

    againBtn.addEventListener("click", () => {
      clearInterval(rollingTimer);
      stopPreLaunchBuzz();

      clicks = 0;
      launched = false;

      rocketBtn.className = "rocket-btn pulse stage-1";
      rocketBtn.style.transform = "scale(1)";
      rocketBtn.style.removeProperty("--scale");

      centerResult.classList.remove("show");
      resultNumber.textContent = "0";
      launchTrail.classList.remove("show");

      counter.textContent = "Тапов: 0";
      againBtn.classList.remove("show");
      setStage(1);
    });

    createStars();
    setStage(1);
  </script>
</body>
</html>
