<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <title>Telegram Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --card-w: min(92vw, 420px);
      --face-size: clamp(140px, 32vw, 190px);
      --text-main: rgba(255,255,255,0.96);
      --text-soft: rgba(255,255,255,0.72);
      --text-dim: rgba(255,255,255,0.48);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      overflow: hidden;
      touch-action: manipulation;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #fff;
      background:
        radial-gradient(circle at top, rgba(0,255,170,0.12), transparent 30%),
        radial-gradient(circle at bottom, rgba(255,70,70,0.10), transparent 34%),
        linear-gradient(160deg, #081018 0%, #111827 45%, #06080d 100%);
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      padding:
        calc(12px + var(--safe-top))
        12px
        calc(12px + var(--safe-bottom))
        12px;
    }

    .bg-glow {
      position: fixed;
      inset: auto;
      width: 440px;
      height: 440px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,255,160,0.16), transparent 65%);
      filter: blur(34px);
      pointer-events: none;
      animation: floatGlow 4.2s ease-in-out infinite;
    }

    @keyframes floatGlow {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-10px) scale(1.06); }
    }

    .app {
      position: relative;
      z-index: 2;
      width: var(--card-w);
      max-height: calc(100vh - var(--safe-top) - var(--safe-bottom) - 24px);
      overflow: hidden;
      border-radius: 28px;
      padding: 18px 16px 18px;
      text-align: center;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(16px);
      box-shadow:
        0 20px 60px rgba(0,0,0,0.45),
        inset 0 1px 0 rgba(255,255,255,0.05);
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 10px;
    }

    .badge {
      align-self: center;
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 13px;
      color: rgba(255,255,255,0.82);
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.07);
    }

    h1 {
      margin: 2px 0 0;
      font-size: clamp(28px, 6vw, 42px);
      line-height: 1.05;
      letter-spacing: -0.04em;
      color: var(--text-main);
    }

    .sub {
      margin: 0 auto;
      max-width: 320px;
      font-size: clamp(14px, 3.6vw, 16px);
      line-height: 1.42;
      color: var(--text-soft);
    }

    .arena {
      position: relative;
      flex: 1 1 auto;
      min-height: 250px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: visible;
      padding: 2px 0;
    }

    .tap-zone {
      position: relative;
      width: min(72vw, 260px);
      height: min(72vw, 260px);
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
    }

    .smiley-btn {
      position: relative;
      width: var(--face-size);
      height: var(--face-size);
      padding: 0;
      border: none;
      background: transparent;
      outline: none;
      cursor: pointer;
      transform: scale(1);
      transition:
        transform 0.14s ease,
        opacity 0.22s ease,
        filter 0.25s ease;
      will-change: transform;
      touch-action: manipulation;
    }

    .smiley-btn.pulse .face-core {
      animation: facePulse 1.8s infinite;
    }

    @keyframes facePulse {
      0% {
        box-shadow:
          0 0 0 0 rgba(255,206,52,0.24),
          0 16px 30px rgba(0,0,0,0.30),
          inset 0 10px 20px rgba(255,255,255,0.18);
      }
      70% {
        box-shadow:
          0 0 0 22px rgba(255,206,52,0),
          0 16px 30px rgba(0,0,0,0.30),
          inset 0 10px 20px rgba(255,255,255,0.18);
      }
      100% {
        box-shadow:
          0 0 0 0 rgba(255,206,52,0),
          0 16px 30px rgba(0,0,0,0.30),
          inset 0 10px 20px rgba(255,255,255,0.18);
      }
    }

    .smiley-btn.shake {
      animation: shake 0.26s linear infinite;
    }

    @keyframes shake {
      0% { transform: translate(0, 0) scale(var(--scale, 1)); }
      20% { transform: translate(-2px, 1px) scale(var(--scale, 1)); }
      40% { transform: translate(2px, -1px) scale(var(--scale, 1)); }
      60% { transform: translate(-2px, -1px) scale(var(--scale, 1)); }
      80% { transform: translate(2px, 1px) scale(var(--scale, 1)); }
      100% { transform: translate(0, 0) scale(var(--scale, 1)); }
    }

    .smiley-btn.boom-hidden {
      opacity: 0;
      transform: scale(0.45);
      pointer-events: none;
    }

    .face-core {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 24%, rgba(255,255,255,0.26), rgba(255,255,255,0.06) 24%, transparent 28%),
        radial-gradient(circle at 50% 58%, rgba(255,255,255,0.05), transparent 50%),
        linear-gradient(180deg, #ffe56d 0%, #ffbe1b 58%, #ff9f00 100%);
      box-shadow:
        0 0 0 0 rgba(255,206,52,0.22),
        0 16px 30px rgba(0,0,0,0.30),
        inset 0 10px 20px rgba(255,255,255,0.18);
      transition: background 0.22s ease, box-shadow 0.22s ease, filter 0.22s ease;
    }

    .smiley-btn.yellow .face-core {
      background:
        radial-gradient(circle at 35% 24%, rgba(255,255,255,0.24), rgba(255,255,255,0.06) 24%, transparent 28%),
        linear-gradient(180deg, #ffd95d 0%, #ffb000 58%, #f77b00 100%);
      box-shadow:
        0 0 0 0 rgba(255,180,0,0.22),
        0 16px 30px rgba(0,0,0,0.30),
        inset 0 10px 20px rgba(255,255,255,0.16);
    }

    .smiley-btn.orange .face-core {
      background:
        radial-gradient(circle at 35% 24%, rgba(255,255,255,0.18), rgba(255,255,255,0.05) 24%, transparent 28%),
        linear-gradient(180deg, #ffbd52 0%, #ff7c00 60%, #d84a00 100%);
      box-shadow:
        0 0 28px rgba(255,124,0,0.22),
        0 16px 30px rgba(0,0,0,0.30),
        inset 0 8px 18px rgba(255,255,255,0.12);
    }

    .smiley-btn.red .face-core {
      background:
        radial-gradient(circle at 35% 24%, rgba(255,255,255,0.14), rgba(255,255,255,0.04) 24%, transparent 28%),
        linear-gradient(180deg, #ff8f8f 0%, #ff3737 58%, #b60000 100%);
      box-shadow:
        0 0 34px rgba(255,55,55,0.32),
        0 16px 30px rgba(0,0,0,0.32),
        inset 0 7px 16px rgba(255,255,255,0.10);
      filter: saturate(1.05);
    }

    .eye {
      position: absolute;
      top: 34%;
      width: 13%;
      height: 18%;
      background: #1f1000;
      border-radius: 50%;
      transition: all 0.22s ease;
      box-shadow: inset 0 -1px 0 rgba(255,255,255,0.05);
    }

    .eye.left { left: 28%; }
    .eye.right { right: 28%; }

    .eye::after {
      content: "";
      position: absolute;
      width: 26%;
      height: 26%;
      top: 20%;
      left: 22%;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
      transition: opacity 0.22s ease;
    }

    .brow {
      position: absolute;
      top: 24%;
      width: 20%;
      height: 4%;
      background: #5c2200;
      border-radius: 999px;
      transition: all 0.22s ease;
      opacity: 0;
    }

    .brow.left { left: 22%; transform: rotate(0deg); }
    .brow.right { right: 22%; transform: rotate(0deg); }

    .mouth {
      position: absolute;
      left: 50%;
      top: 59%;
      width: 34%;
      height: 14%;
      transform: translateX(-50%);
      border-bottom: 6px solid #6c2200;
      border-radius: 0 0 60px 60px;
      transition: all 0.22s ease;
    }

    .mouth::before,
    .mouth::after {
      content: "";
      position: absolute;
      bottom: -6px;
      width: 12px;
      height: 6px;
      background: transparent;
      border-bottom: 6px solid #6c2200;
      transition: all 0.22s ease;
    }

    .mouth::before {
      left: -1px;
      border-radius: 0 0 0 10px;
      transform: rotate(10deg);
    }

    .mouth::after {
      right: -1px;
      border-radius: 0 0 10px 0;
      transform: rotate(-10deg);
    }

    /* Стадии лица */
    .stage-1 .brow,
    .stage-2 .brow {
      opacity: 0;
    }

    .stage-1 .eye,
    .stage-2 .eye {
      top: 35%;
      width: 13%;
      height: 18%;
      border-radius: 50%;
      transform: rotate(0deg);
    }

    .stage-1 .mouth {
      top: 58%;
      width: 34%;
      height: 14%;
      border-bottom-width: 6px;
      border-radius: 0 0 60px 60px;
    }

    .stage-2 .mouth {
      top: 60%;
      width: 28%;
      height: 9%;
      border-bottom-width: 5px;
      border-radius: 0 0 30px 30px;
    }

    .stage-3 .brow {
      opacity: 1;
      top: 26%;
      width: 18%;
      height: 4%;
    }

    .stage-3 .brow.left { transform: rotate(14deg); }
    .stage-3 .brow.right { transform: rotate(-14deg); }

    .stage-3 .eye {
      top: 36%;
      width: 14%;
      height: 12%;
      border-radius: 40% 40% 50% 50%;
    }

    .stage-3 .mouth {
      top: 62%;
      width: 26%;
      height: 8%;
      border-bottom-width: 5px;
      border-radius: 0 0 24px 24px;
    }

    .stage-4 .brow,
    .stage-5 .brow {
      opacity: 1;
      top: 24%;
      width: 22%;
      height: 4.2%;
      background: #4f1500;
    }

    .stage-4 .brow.left { transform: rotate(26deg); }
    .stage-4 .brow.right { transform: rotate(-26deg); }

    .stage-5 .brow.left { transform: rotate(34deg); }
    .stage-5 .brow.right { transform: rotate(-34deg); }

    .stage-4 .eye {
      top: 38%;
      width: 15%;
      height: 8%;
      border-radius: 999px;
      transform: rotate(-6deg);
    }

    .stage-5 .eye {
      top: 38%;
      width: 16%;
      height: 7%;
      border-radius: 999px;
      background: #270300;
    }

    .stage-4 .eye.left { transform: rotate(14deg); }
    .stage-4 .eye.right { transform: rotate(-14deg); }
    .stage-5 .eye.left { transform: rotate(18deg); }
    .stage-5 .eye.right { transform: rotate(-18deg); }

    .stage-4 .eye::after,
    .stage-5 .eye::after {
      opacity: 0;
    }

    .stage-4 .mouth {
      top: 62%;
      width: 34%;
      height: 15%;
      border-bottom: none;
      border-top: 6px solid #610f00;
      border-radius: 32px 32px 0 0;
    }

    .stage-4 .mouth::before,
    .stage-4 .mouth::after {
      bottom: auto;
      top: -6px;
      border-bottom: none;
      border-top: 6px solid #610f00;
    }

    .stage-5 .mouth {
      top: 59%;
      width: 36%;
      height: 19%;
      background: linear-gradient(180deg, #3a0000 0%, #6d0000 100%);
      border: 5px solid #5f0d00;
      border-radius: 18px 18px 34px 34px;
      overflow: hidden;
    }

    .stage-5 .mouth::before,
    .stage-5 .mouth::after {
      display: none;
    }

    .stage-5 .mouth .tongue {
      position: absolute;
      left: 50%;
      bottom: -1px;
      width: 55%;
      height: 46%;
      transform: translateX(-50%);
      background: linear-gradient(180deg, #ff7a9f 0%, #ff537a 100%);
      border-radius: 24px 24px 12px 12px;
    }

    .counter {
      min-height: 20px;
      margin-top: -2px;
      font-size: 14px;
      color: rgba(255,255,255,0.78);
    }

    .hint {
      margin-top: -2px;
      font-size: 13px;
      color: var(--text-dim);
    }

    .result-wrap {
      min-height: 84px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .result-card {
      width: 100%;
      max-width: 280px;
      padding: 14px 16px;
      border-radius: 20px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow:
        0 16px 30px rgba(0,0,0,0.22),
        inset 0 1px 0 rgba(255,255,255,0.05);
      opacity: 0;
      transform: translateY(10px) scale(0.96);
      transition: 0.28s ease;
      pointer-events: none;
    }

    .result-card.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .result-label {
      font-size: 13px;
      color: rgba(255,255,255,0.66);
      margin-bottom: 4px;
    }

    .result-number {
      font-size: clamp(36px, 10vw, 48px);
      font-weight: 800;
      letter-spacing: -0.05em;
      color: #fff;
      text-shadow: 0 0 20px rgba(255,255,255,0.18);
    }

    .result-sub {
      margin-top: 4px;
      font-size: 13px;
      color: rgba(255,255,255,0.58);
    }

    .again-btn {
      align-self: center;
      border: none;
      border-radius: 16px;
      padding: 14px 18px;
      min-width: 160px;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, #2b80ff, #6d4dff);
      box-shadow: 0 12px 28px rgba(47,108,255,0.32);
      cursor: pointer;
      display: none;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .again-btn.show {
      display: inline-block;
    }

    .again-btn:active {
      transform: translateY(1px) scale(0.98);
    }

    .particle {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 14px;
      height: 14px;
      margin-left: -7px;
      margin-top: -7px;
      pointer-events: none;
      opacity: 1;
      transform: translate(0, 0) scale(1);
      animation: fly 980ms cubic-bezier(.15,.75,.25,1) forwards;
      box-shadow: 0 0 18px currentColor;
    }

    @keyframes fly {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(1) rotate(0deg);
      }
      72% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translate(var(--x), var(--y)) scale(0.18) rotate(360deg);
      }
    }

    .flash {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 40px;
      height: 40px;
      transform: translate(-50%, -50%) scale(0.2);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.95), rgba(255,120,120,0.4), transparent 72%);
      pointer-events: none;
      opacity: 0;
      animation: flash 420ms ease-out forwards;
    }

    @keyframes flash {
      0% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(0.2);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(7);
      }
    }

    @media (max-width: 390px) {
      .app {
        padding: 16px 14px 16px;
        gap: 8px;
      }

      .arena {
        min-height: 220px;
      }

      .badge {
        font-size: 12px;
        padding: 7px 12px;
      }

      .sub {
        max-width: 300px;
      }

      .result-wrap {
        min-height: 74px;
      }

      .result-card {
        padding: 12px 14px;
        max-width: 260px;
      }

      .again-btn {
        min-width: 148px;
        padding: 13px 16px;
        font-size: 15px;
      }
    }

    @media (max-height: 760px) {
      .app {
        max-height: calc(100vh - var(--safe-top) - var(--safe-bottom) - 16px);
        gap: 7px;
      }

      .arena {
        min-height: 190px;
      }

      .sub {
        font-size: 14px;
      }

      .badge {
        margin-bottom: 0;
      }

      .result-wrap {
        min-height: 66px;
      }

      .result-card {
        padding: 12px 14px;
      }
    }

    @media (max-height: 680px) {
      :root {
        --face-size: 132px;
      }

      .arena {
        min-height: 168px;
      }

      h1 {
        font-size: 26px;
      }

      .sub {
        font-size: 13px;
        line-height: 1.34;
      }

      .counter,
      .hint,
      .result-label,
      .result-sub {
        font-size: 12px;
      }

      .result-number {
        font-size: 34px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <div class="app">
    <div class="badge">Telegram Mini App Test</div>
    <h1>Злой смайлик</h1>
    <div class="sub">
      Жми на смайлик. Он будет всё сильнее беситься, менять лицо, а потом взорвётся и выбросит случайное число.
    </div>

    <div class="arena" id="arena">
      <div class="tap-zone">
        <button class="smiley-btn pulse stage-1" id="smileyBtn" aria-label="Злой смайлик">
          <div class="face-core"></div>
          <div class="brow left"></div>
          <div class="brow right"></div>
          <div class="eye left"></div>
          <div class="eye right"></div>
          <div class="mouth" id="mouth">
            <div class="tongue" id="tongue" style="display:none;"></div>
          </div>
        </button>
      </div>
    </div>

    <div class="counter" id="counter">Нажатий: 0</div>
    <div class="hint">На 10-м нажатии — взрыв и случайное число.</div>

    <div class="result-wrap">
      <div class="result-card" id="resultCard">
        <div class="result-label">Твой случайный результат</div>
        <div class="result-number" id="resultNumber">0</div>
        <div class="result-sub">Число выпало после взрыва</div>
      </div>
    </div>

    <button class="again-btn" id="againBtn">Ещё раз</button>
  </div>

  <script>
    if (window.Telegram && Telegram.WebApp) {
      Telegram.WebApp.ready();
      Telegram.WebApp.expand();
    }

    const smileyBtn = document.getElementById("smileyBtn");
    const mouth = document.getElementById("mouth");
    const tongue = document.getElementById("tongue");
    const againBtn = document.getElementById("againBtn");
    const counter = document.getElementById("counter");
    const arena = document.getElementById("arena");
    const resultCard = document.getElementById("resultCard");
    const resultNumber = document.getElementById("resultNumber");

    let clicks = 0;
    let exploded = false;
    let rollingTimer = null;

    function setStage(stage) {
      smileyBtn.classList.remove("stage-1", "stage-2", "stage-3", "stage-4", "stage-5");
      smileyBtn.classList.add(`stage-${stage}`);

      if (stage >= 5) {
        tongue.style.display = "block";
      } else {
        tongue.style.display = "none";
      }
    }

    function getStageByClicks(value) {
      if (value <= 2) return 1;
      if (value <= 4) return 2;
      if (value <= 6) return 3;
      if (value <= 8) return 4;
      return 5;
    }

    function updateVisualState() {
      const scale = 1 + clicks * 0.075;
      smileyBtn.style.setProperty("--scale", scale.toFixed(2));
      smileyBtn.style.transform = `scale(${scale})`;

      smileyBtn.classList.remove("yellow", "orange", "red", "shake");

      if (clicks >= 3) smileyBtn.classList.add("yellow");
      if (clicks >= 6) smileyBtn.classList.add("orange");
      if (clicks >= 8) {
        smileyBtn.classList.add("red");
        smileyBtn.classList.add("shake");
      }

      setStage(getStageByClicks(clicks));
      counter.textContent = `Нажатий: ${clicks}`;
    }

    function createFlash() {
      const flash = document.createElement("div");
      flash.className = "flash";
      arena.appendChild(flash);
      setTimeout(() => flash.remove(), 450);
    }

    function createParticles() {
      const colors = [
        "#fff2b7", "#ffd24a", "#ffae00", "#ff7a00",
        "#ff4d4d", "#ff6b6b", "#ffe5a6", "#ffffff"
      ];

      for (let i = 0; i < 38; i++) {
        const p = document.createElement("div");
        p.className = "particle";

        const angle = (Math.PI * 2 * i) / 38 + (Math.random() * 0.38);
        const distance = 92 + Math.random() * 138;
        const x = Math.cos(angle) * distance;
        const y = Math.sin(angle) * distance;

        const size = 7 + Math.random() * 15;
        const color = colors[Math.floor(Math.random() * colors.length)];

        p.style.setProperty("--x", `${x}px`);
        p.style.setProperty("--y", `${y}px`);
        p.style.width = `${size}px`;
        p.style.height = `${size}px`;
        p.style.marginLeft = `${-size / 2}px`;
        p.style.marginTop = `${-size / 2}px`;
        p.style.background = color;
        p.style.color = color;

        const shape = Math.random();
        if (shape > 0.66) {
          p.style.borderRadius = "3px";
        } else if (shape > 0.33) {
          p.style.borderRadius = "50% 20% 50% 20%";
        } else {
          p.style.borderRadius = "50%";
        }

        arena.appendChild(p);
        setTimeout(() => p.remove(), 1050);
      }
    }

    function getRandomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function vibrate(type) {
      try {
        if (window.Telegram && Telegram.WebApp && Telegram.WebApp.HapticFeedback) {
          if (type === "light") Telegram.WebApp.HapticFeedback.impactOccurred("light");
          if (type === "medium") Telegram.WebApp.HapticFeedback.impactOccurred("medium");
          if (type === "heavy") Telegram.WebApp.HapticFeedback.impactOccurred("heavy");
          if (type === "success") Telegram.WebApp.HapticFeedback.notificationOccurred("success");
        }
      } catch (e) {}
    }

    function rollResult(finalValue) {
      resultCard.classList.add("show");
      let steps = 14;
      clearInterval(rollingTimer);

      rollingTimer = setInterval(() => {
        resultNumber.textContent = getRandomInt(1, 100);
        steps--;

        if (steps <= 0) {
          clearInterval(rollingTimer);
          resultNumber.textContent = finalValue;
          vibrate("success");
        }
      }, 55);
    }

    function explodeSmiley() {
      exploded = true;
      smileyBtn.classList.remove("pulse", "shake");
      smileyBtn.classList.add("boom-hidden");

      createFlash();
      createParticles();
      vibrate("heavy");

      const randomValue = getRandomInt(1, 100);
      rollResult(randomValue);

      counter.textContent = "Бах. Смайлик не выдержал.";
      againBtn.classList.add("show");
    }

    function pressSmiley(event) {
      event.preventDefault();
      if (exploded) return;

      clicks += 1;
      updateVisualState();

      if (clicks >= 7) vibrate("light");
      if (clicks >= 9) vibrate("medium");

      if (clicks >= 10) {
        explodeSmiley();
      }
    }

    smileyBtn.addEventListener("pointerdown", pressSmiley, { passive: false });
    smileyBtn.addEventListener("click", (event) => {
      event.preventDefault();
    }, { passive: false });

    againBtn.addEventListener("click", () => {
      clearInterval(rollingTimer);

      clicks = 0;
      exploded = false;

      smileyBtn.className = "smiley-btn pulse stage-1";
      smileyBtn.style.transform = "scale(1)";
      smileyBtn.style.removeProperty("--scale");

      tongue.style.display = "none";
      counter.textContent = "Нажатий: 0";
      resultNumber.textContent = "0";
      resultCard.classList.remove("show");
      againBtn.classList.remove("show");
    });
  </script>
</body>
</html>
