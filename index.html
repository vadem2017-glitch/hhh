<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>Telegram Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      overflow: hidden;
      touch-action: manipulation;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background:
        radial-gradient(circle at top, rgba(0, 255, 170, 0.15), transparent 30%),
        radial-gradient(circle at bottom, rgba(255, 70, 70, 0.12), transparent 35%),
        linear-gradient(160deg, #081018 0%, #111827 45%, #06080d 100%);
      color: #fff;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .bg-glow {
      position: fixed;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,255,150,0.18), transparent 65%);
      filter: blur(30px);
      pointer-events: none;
      animation: floatGlow 4s ease-in-out infinite;
    }

    @keyframes floatGlow {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-12px) scale(1.06); }
    }

    .app {
      position: relative;
      z-index: 2;
      width: min(92vw, 420px);
      padding: 28px 22px 30px;
      border-radius: 28px;
      text-align: center;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(16px);
      box-shadow:
        0 20px 60px rgba(0,0,0,0.45),
        inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 13px;
      color: rgba(255,255,255,0.82);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.07);
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    .sub {
      margin: 10px 0 24px;
      font-size: 15px;
      line-height: 1.45;
      color: rgba(255,255,255,0.72);
    }

    .arena {
      position: relative;
      height: 340px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: visible;
    }

    .tap-zone {
      position: relative;
      width: 240px;
      height: 240px;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
    }

    .emoji-btn {
      position: relative;
      width: 170px;
      height: 170px;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      touch-action: manipulation;
      outline: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: scale(1);
      transition:
        transform 0.14s ease,
        background 0.25s ease,
        box-shadow 0.25s ease,
        opacity 0.25s ease,
        filter 0.25s ease;
      will-change: transform;
      background:
        radial-gradient(circle at 30% 30%, #53ff9f 0%, #00b85c 65%, #00793c 100%);
      box-shadow:
        0 0 30px rgba(0,255,140,0.22),
        0 18px 36px rgba(0,0,0,0.35),
        inset 0 8px 18px rgba(255,255,255,0.22);
    }

    .emoji-btn::before {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 25%, rgba(255,255,255,0.18), transparent 45%);
      pointer-events: none;
    }

    .emoji-btn.pulse {
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      0% {
        box-shadow:
          0 0 0 0 rgba(0,255,140,0.26),
          0 18px 36px rgba(0,0,0,0.35),
          inset 0 8px 18px rgba(255,255,255,0.22);
      }
      70% {
        box-shadow:
          0 0 0 26px rgba(0,255,140,0),
          0 18px 36px rgba(0,0,0,0.35),
          inset 0 8px 18px rgba(255,255,255,0.22);
      }
      100% {
        box-shadow:
          0 0 0 0 rgba(0,255,140,0),
          0 18px 36px rgba(0,0,0,0.35),
          inset 0 8px 18px rgba(255,255,255,0.22);
      }
    }

    .emoji-btn.yellow {
      background:
        radial-gradient(circle at 30% 30%, #ffe27a 0%, #ffb300 68%, #d88200 100%);
      box-shadow:
        0 0 30px rgba(255,196,0,0.26),
        0 18px 36px rgba(0,0,0,0.35),
        inset 0 8px 18px rgba(255,255,255,0.18);
    }

    .emoji-btn.orange {
      background:
        radial-gradient(circle at 30% 30%, #ffd45a 0%, #ff8a00 68%, #cc5c00 100%);
      box-shadow:
        0 0 30px rgba(255,166,0,0.28),
        0 18px 36px rgba(0,0,0,0.35),
        inset 0 8px 18px rgba(255,255,255,0.18);
    }

    .emoji-btn.red {
      background:
        radial-gradient(circle at 30% 30%, #ff7d7d 0%, #ff2f2f 68%, #b30000 100%);
      box-shadow:
        0 0 34px rgba(255,60,60,0.34),
        0 18px 36px rgba(0,0,0,0.35),
        inset 0 8px 18px rgba(255,255,255,0.14);
    }

    .emoji-btn.shake {
      animation: shake 0.32s linear infinite;
    }

    @keyframes shake {
      0% { transform: translate(0, 0) scale(var(--scale, 1)); }
      20% { transform: translate(-2px, 1px) scale(var(--scale, 1)); }
      40% { transform: translate(2px, -1px) scale(var(--scale, 1)); }
      60% { transform: translate(-2px, -1px) scale(var(--scale, 1)); }
      80% { transform: translate(2px, 1px) scale(var(--scale, 1)); }
      100% { transform: translate(0, 0) scale(var(--scale, 1)); }
    }

    .emoji-btn.boom-hidden {
      opacity: 0;
      transform: scale(0.6);
      pointer-events: none;
    }

    .emoji-face {
      position: relative;
      z-index: 2;
      font-size: 82px;
      line-height: 1;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.18));
      transition: transform 0.2s ease, filter 0.2s ease;
      pointer-events: none;
    }

    .emoji-btn:active .emoji-face {
      transform: scale(0.96);
    }

    .counter {
      margin-top: 10px;
      font-size: 14px;
      color: rgba(255,255,255,0.78);
      min-height: 20px;
    }

    .hint {
      margin-top: 10px;
      font-size: 13px;
      color: rgba(255,255,255,0.48);
    }

    .result-wrap {
      min-height: 92px;
      margin-top: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .result-card {
      width: 100%;
      max-width: 280px;
      padding: 16px 18px;
      border-radius: 20px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow:
        0 16px 30px rgba(0,0,0,0.22),
        inset 0 1px 0 rgba(255,255,255,0.05);
      opacity: 0;
      transform: translateY(10px) scale(0.96);
      transition: 0.28s ease;
      pointer-events: none;
    }

    .result-card.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .result-label {
      font-size: 13px;
      color: rgba(255,255,255,0.66);
      margin-bottom: 6px;
    }

    .result-number {
      font-size: 40px;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: #fff;
      text-shadow: 0 0 20px rgba(255,255,255,0.18);
    }

    .result-sub {
      margin-top: 6px;
      font-size: 13px;
      color: rgba(255,255,255,0.58);
    }

    .again-btn {
      margin-top: 18px;
      border: none;
      border-radius: 16px;
      padding: 14px 18px;
      min-width: 160px;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, #2b80ff, #6d4dff);
      box-shadow: 0 12px 28px rgba(47,108,255,0.32);
      cursor: pointer;
      display: none;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .again-btn:active {
      transform: translateY(1px) scale(0.98);
    }

    .again-btn.show {
      display: inline-block;
    }

    .particle {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 14px;
      height: 14px;
      margin-left: -7px;
      margin-top: -7px;
      border-radius: 50%;
      pointer-events: none;
      opacity: 1;
      transform: translate(0, 0) scale(1);
      animation: fly 950ms cubic-bezier(.15,.75,.25,1) forwards;
      box-shadow: 0 0 18px currentColor;
    }

    @keyframes fly {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(1);
      }
      70% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translate(var(--x), var(--y)) scale(0.2) rotate(360deg);
      }
    }

    .flash {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 40px;
      height: 40px;
      transform: translate(-50%, -50%) scale(0.2);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.95), rgba(255,120,120,0.4), transparent 72%);
      pointer-events: none;
      opacity: 0;
      animation: flash 420ms ease-out forwards;
    }

    @keyframes flash {
      0% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(0.2);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(7);
      }
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <div class="app">
    <div class="badge">Telegram Mini App Test</div>
    <h1>Злой смайлик</h1>
    <div class="sub">
      Жми на смайлик. С каждым нажатием он будет всё сильнее беситься, а после взрыва выпадет случайное число.
    </div>

    <div class="arena" id="arena">
      <div class="tap-zone">
        <button class="emoji-btn pulse" id="emojiBtn" aria-label="Смайлик">
          <div class="emoji-face" id="emojiFace">🙂</div>
        </button>
      </div>
    </div>

    <div class="counter" id="counter">Нажатий: 0</div>
    <div class="hint">На 10-м нажатии — взрыв и случайное число.</div>

    <div class="result-wrap">
      <div class="result-card" id="resultCard">
        <div class="result-label">Твой случайный результат</div>
        <div class="result-number" id="resultNumber">0</div>
        <div class="result-sub">Число выпало после взрыва</div>
      </div>
    </div>

    <button class="again-btn" id="againBtn">Ещё раз</button>
  </div>

  <script>
    if (window.Telegram && Telegram.WebApp) {
      Telegram.WebApp.ready();
      Telegram.WebApp.expand();
    }

    const emojiBtn = document.getElementById("emojiBtn");
    const emojiFace = document.getElementById("emojiFace");
    const againBtn = document.getElementById("againBtn");
    const counter = document.getElementById("counter");
    const arena = document.getElementById("arena");
    const resultCard = document.getElementById("resultCard");
    const resultNumber = document.getElementById("resultNumber");

    let clicks = 0;
    let exploded = false;

    function getEmojiByClicks(value) {
      if (value <= 2) return "🙂";
      if (value <= 4) return "😐";
      if (value <= 6) return "😠";
      if (value <= 8) return "😡";
      return "🤬";
    }

    function updateVisualState() {
      const scale = 1 + clicks * 0.08;
      emojiBtn.style.setProperty("--scale", scale.toFixed(2));
      emojiBtn.style.transform = `scale(${scale})`;

      emojiBtn.classList.remove("yellow", "orange", "red", "shake");

      if (clicks >= 3) {
        emojiBtn.classList.add("yellow");
      }

      if (clicks >= 6) {
        emojiBtn.classList.add("orange");
      }

      if (clicks >= 8) {
        emojiBtn.classList.add("red");
        emojiBtn.classList.add("shake");
      }

      emojiFace.textContent = getEmojiByClicks(clicks);
      counter.textContent = `Нажатий: ${clicks}`;
    }

    function createFlash() {
      const flash = document.createElement("div");
      flash.className = "flash";
      arena.appendChild(flash);
      setTimeout(() => flash.remove(), 450);
    }

    function createParticles() {
      const colors = [
        "#ffffff", "#ff4d4d", "#ff7a00", "#ffd54a",
        "#ff2f6d", "#ffb347", "#ffe9a8", "#ff6b6b"
      ];

      for (let i = 0; i < 34; i++) {
        const p = document.createElement("div");
        p.className = "particle";

        const angle = (Math.PI * 2 * i) / 34 + (Math.random() * 0.35);
        const distance = 90 + Math.random() * 135;
        const x = Math.cos(angle) * distance;
        const y = Math.sin(angle) * distance;

        const size = 8 + Math.random() * 14;
        const color = colors[Math.floor(Math.random() * colors.length)];

        p.style.setProperty("--x", `${x}px`);
        p.style.setProperty("--y", `${y}px`);
        p.style.width = `${size}px`;
        p.style.height = `${size}px`;
        p.style.marginLeft = `${-size / 2}px`;
        p.style.marginTop = `${-size / 2}px`;
        p.style.background = color;
        p.style.color = color;

        if (Math.random() > 0.55) {
          p.style.borderRadius = "3px";
        }

        arena.appendChild(p);
        setTimeout(() => p.remove(), 1000);
      }
    }

    function getRandomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function explodeEmoji() {
      exploded = true;
      emojiBtn.classList.remove("pulse", "shake");
      emojiBtn.classList.add("boom-hidden");

      createFlash();
      createParticles();

      const randomValue = getRandomInt(1, 100);
      resultNumber.textContent = randomValue;
      resultCard.classList.add("show");

      counter.textContent = "Бах. Смайлик не выдержал.";
      againBtn.classList.add("show");
    }

    function pressEmoji(event) {
      event.preventDefault();
      if (exploded) return;

      clicks += 1;
      updateVisualState();

      if (clicks >= 10) {
        explodeEmoji();
      }
    }

    emojiBtn.addEventListener("pointerdown", pressEmoji, { passive: false });

    emojiBtn.addEventListener("click", (event) => {
      event.preventDefault();
    }, { passive: false });

    againBtn.addEventListener("click", () => {
      clicks = 0;
      exploded = false;

      emojiBtn.className = "emoji-btn pulse";
      emojiFace.textContent = "🙂";
      emojiBtn.style.transform = "scale(1)";
      emojiBtn.style.removeProperty("--scale");

      counter.textContent = "Нажатий: 0";
      resultNumber.textContent = "0";
      resultCard.classList.remove("show");
      againBtn.classList.remove("show");
    });
  </script>
</body>
</html>
